site_name: AI Agent 学习手册
site_description: 面向初学者、由浅入深、带可靠 references 的 AI Agent 中文学习手册。
site_url: https://example.github.io/readings-ai-agent/
repo_name: readings-ai-agent

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - 首页: index.md
  - 内容蓝图:
      - 主题地图: topic-map.md
      - 术语边界表: glossary.md
      - 初学者学习路径: learning-path.md
      - 章节目录: chapter-outline.md
  - 章节正文:
      - 00. 序言：如何学习 AI Agent: chapters/00-preface.md
      - 01. AI Agent 是什么: chapters/01-agent-landscape.md
      - 02. LLM 基础与上下文工程: chapters/02-llm-context.md
      - 03. Tool Use、Function Calling 与 Structured Output: chapters/03-tool-use.md
  - 治理:
      - Goal: governance/goal.md
      - 质量标准: governance/quality-standard.md
      - References 规范: governance/references-style.md
  - 资料:
      - 资料库说明: sources/README.md
      - 候选资料清单: sources/seed-candidates.md
      - Source Card 索引: sources/source-card-index.md
      - Source Cards:
          - 目录: sources/source-cards/index.md
          - RAG paper: sources/source-cards/2020-rag-paper.md
          - ReAct paper: sources/source-cards/2022-react-paper.md
          - Generative Agents paper: sources/source-cards/2023-generative-agents-paper.md
          - MemoryBank paper: sources/source-cards/2023-memorybank-paper.md
          - MemGPT paper: sources/source-cards/2023-memgpt-paper.md
          - AgentBench paper: sources/source-cards/2023-agentbench-paper.md
          - Reflexion paper: sources/source-cards/2023-reflexion-paper.md
          - Toolformer paper: sources/source-cards/2023-toolformer-paper.md
          - Tree of Thoughts paper: sources/source-cards/2023-tree-of-thoughts-paper.md
          - WebArena paper: sources/source-cards/2023-webarena-paper.md
          - AutoGen docs: sources/source-cards/2026-autogen-docs.md
          - CrewAI docs: sources/source-cards/2026-crewai-docs.md
          - MCP servers repo: sources/source-cards/2026-mcp-servers-repo.md
          - OpenAI Function Calling docs: sources/source-cards/2026-openai-function-calling-docs.md
          - MCP official docs: sources/source-cards/2026-mcp-official-docs.md
          - LangGraph docs: sources/source-cards/2026-langgraph-docs.md
          - LangGraph memory docs: sources/source-cards/2026-langgraph-memory-docs.md
          - Letta docs: sources/source-cards/2026-letta-docs.md
          - LlamaIndex docs: sources/source-cards/2026-llamaindex-docs.md
          - NIST AI RMF: sources/source-cards/2026-nist-ai-rmf.md
          - OpenAI Agents SDK docs: sources/source-cards/2026-openai-agents-sdk-docs.md
          - OpenAI Cookbook: sources/source-cards/2026-openai-cookbook.md
          - OpenAI Evals repo: sources/source-cards/2026-openai-evals-repo.md
          - OpenAI Responses API docs: sources/source-cards/2026-openai-responses-api-docs.md
          - OWASP LLM Top 10: sources/source-cards/2026-owasp-llm-top-10.md
          - Semantic Kernel docs: sources/source-cards/2026-semantic-kernel-docs.md
          - Zep docs: sources/source-cards/2026-zep-docs.md
  - References:
      - 覆盖矩阵: references/coverage-matrix.md
  - 证据与实验:
      - 待验证问题: evidence/validation-backlog.md
      - 结论证据台账: evidence/claim-ledger.md
      - 实验说明: experiments/README.md
  - 模板:
      - 资料卡片模板: governance/templates/source-card.md
      - 章节模板: governance/templates/chapter-template.md
      - Evidence Note 模板: governance/templates/evidence-note.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
